name: Docker Release

on:
  push:
    tags:
      - "[vV]*.*.*" # Trigger on any tag matching the pattern vX.Y.Z

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      run_release: ${{ steps.check.outputs.run_release }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f .github/template ]; then
            echo "run_release=false" >> $GITHUB_OUTPUT
          else
            echo "run_release=true" >> $GITHUB_OUTPUT
          fi

  build_and_publish:
    needs: guard
    if: needs.guard.outputs.run_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract tag version
        id: extract_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: docker_build_push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ steps.extract_version.outputs.VERSION }}
          file: Dockerfile

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ steps.extract_version.outputs.VERSION }}
          body: |
            Release of version ${{ steps.extract_version.outputs.VERSION }}

            *(Add your release notes here)*
          draft: false
          prerelease: ${{ contains(github.ref, '-') }} # Mark as prerelease if tag contains a hyphen

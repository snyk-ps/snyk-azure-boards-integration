# Sample operator configuration (non-secret). Copy or pass --config data/sample-config.yaml
# Replace placeholder values with your Snyk group and policy. Secrets (SNYK_TOKEN, Azure PAT)
# stay in environment variables or Key Vault — never put them in this file.

azure_boards:
  defaults:
    # Routing for group-scoped sync (when org_mappings is absent): ADO org/project names.
    organization: "your-azure-devops-org"
    project: "your-azure-devops-project"
    create_new_work_items: true
    # Minimum severity for listing issues (Snyk Issues API effective_severity_level).
    severity_threshold: high
    # historical | <ISO-8601 timestamp> — limit which issues are considered for sync.
    issues_sync_from: historical
    # When true, only create work items when the issue indicates a fix is available.
    create_only_when_fix_available: false
    # new_work_item | reopen_existing — behavior when a mapped work item is missing in ADO.
    reopen_work_item_policy: new_work_item
    work_item_type: Task
    work_item_state_active: New
    work_item_state_closed: Closed
    # Optional: plain text appended after the auto-generated work item description (one extra block).
    # work_item_description_appendix: |
    #   Internal: request Snyk access at https://example.internal/access
    work_item_template:
      tags:
        - Snyk
      # json_patch: []

  # For canonical app.snyk.io links in work items, use org_mappings below with snyk_org_slug per row.
  # Group-scoped sync (this layout) does not configure an org slug; links may be incomplete until then.
  # Work item type and Boards states must exist for your process (Agile Task vs CMMI, etc.).

  # Multi-target sync (optional): each row maps one ADO org/project to one Snyk org UUID.
  # Uncomment and edit when using org-scoped issue listing instead of a single group_id scope.
  # org_mappings:
  #   - organization: "your-azure-devops-org"
  #     project: "your-azure-devops-project"
  #     snyk_org_id: "00000000-0000-0000-0000-000000000002"
  #     snyk_org_slug: "your-snyk-org-slug"
  #     overrides:
  #       severity_threshold: critical
  #       work_item_type: Task
  #       # work_item_description_appendix: "Note for this ADO project only."
  #       # work_item_template:
  #       #   tags: ["TeamA"]

snyk:
  group_id: "00000000-0000-0000-0000-000000000001"

# Local mapping DB for dev/tests (non-secret). Do not put tokens or PATs in this path.
mapping_store: sqlite
sqlite_path: data/mapping_store.sqlite
